<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Archive Reader</title>
<link rel="stylesheet" href="css/app.css">
</head>
<body>
<div class="container">
    <h2>🧡 Archive Reader</h2>

    <div class="upload-zone" id="uploadZone">
        <label class="btn" for="fileInput">📁 Import export file(s)</label>
        <input type="file" id="fileInput" accept=".json,application/json" multiple>
        <p id="file-status">Pick the conversations.json from a Claude or ChatGPT data export.
        Everything stays on your device.</p>
    </div>

    <input type="text" id="search" class="search-box" placeholder="🔍 Search titles and messages…" style="display:none;">
    <div class="toolbar" id="toolbar">
        <label><input type="checkbox" id="searchBodies" checked> Search inside messages</label>
        <button class="sm-btn danger" id="clearBtn">🗑 Clear library</button>
        <span class="count" id="countLabel"></span>
    </div>

    <div id="listView"></div>
    <div id="readerView" style="display:none;"></div>
</div>

<!-- Plain scripts, no bundler: works on-device and when opened directly in a browser -->
<script src="js/tree.js"></script>
<script src="js/db.js"></script>
<script src="js/importers/claude.js"></script>
<script src="js/importers/chatgpt.js"></script>
<script src="js/importers/index.js"></script>
<script src="js/app.js"></script>
</body>
</html>
