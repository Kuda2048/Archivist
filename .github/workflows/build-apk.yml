name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install web dependencies
        run: npm ci

      - name: Sync web assets into the Android project
        run: npx cap sync android

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleDebug
        working-directory: android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: archive-reader-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      # Also publish the raw .apk on a rolling "latest-debug" release so it
      # can be downloaded directly on a phone — no zip wrapper, no login.
      - name: Prepare release APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk archivist-debug.apk

      - name: Publish latest-debug release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-debug
          name: Latest debug build
          body: |
            Rolling debug build of the latest `main`. Download
            `archivist-debug.apk` below straight to your phone and tap it
            to install (requires Android 9+).
          prerelease: true
          files: archivist-debug.apk
